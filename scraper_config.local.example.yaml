# Скопируйте в scraper_config.local.yaml в корне репозитория (файл в .gitignore).
# Подхватывается автоматически поверх scraper_config.yaml.

storage:
  postgres:
    dsn: "postgresql://wra:wra@127.0.0.1:5432/wra"

# Быстрый локальный прогон без лимитов «2 машины за ночь»
max_new_saves_per_run: 0

daily_update:
  new_list_pages_per_run: 2
  new_cars_limit: 30
  sold_check_sample: 0

# Прокси только здесь (не в git). FloppyData HTTP (UK rotational mobile и т.д.):
#   http://LOGIN:PASSWORD@geo.floppydata.com:10080
# На сервере удобнее одна строка в /etc/default/rideauto: ENCAR_PROXY_URLS=...
proxy:
  enabled: true
  urls:
    - "http://LOGIN:PASSWORD@geo.floppydata.com:10080"

http:
  concurrency: 4
