# Install: pip install pre-commit && pre-commit install
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix, --config, backend/ruff.toml]
        files: ^backend/.*\.py$
      - id: ruff-format
        args: [--config, backend/ruff.toml]
        files: ^backend/.*\.py$
