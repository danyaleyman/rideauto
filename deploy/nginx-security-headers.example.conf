# Подключение: в server { ... } для HTTPS-сайта
# include /path/to/nginx-security-headers.example.conf;

add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

# Только для HTTPS (server 443). Подберите max-age под политику деплоя:
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Content-Security-Policy сильно зависит от inline-скриптов в car.html / index.html.
# Включайте только после аудита: иначе сломаются инлайн-скрипты и сторонние виджеты.
# Пример (закомментирован):
# add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; frame-ancestors 'self';" always;
