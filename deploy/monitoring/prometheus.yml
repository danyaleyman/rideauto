# Минимальный Prometheus на том же хосте, что и prod-encar API.
# API слушает на хосте 8080; контейнер Prometheus с --network host видит 127.0.0.1:8080.
#
# Запуск: см. docs/MONITORING.md → «Порядок: Prometheus на сервере».

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["127.0.0.1:9093"]

scrape_configs:
  - job_name: prod-encar-api
    metrics_path: /metrics
    static_configs:
      - targets: ["127.0.0.1:8080"]
