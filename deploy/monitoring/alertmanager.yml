# Alertmanager. UI: http://127.0.0.1:9093
# Токен и chat_id не в git — файлы на сервере, см. docs/MONITORING.md.

global:
  resolve_timeout: 5m

templates:
  - "/etc/alertmanager/templates/*.tmpl"

route:
  receiver: telegram
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: telegram
    telegram_configs:
      - bot_token_file: /etc/alertmanager/secrets/bot_token
        chat_id_file: /etc/alertmanager/secrets/chat_id
        send_resolved: true
        parse_mode: HTML
        message: '{{ template "telegram.ru.message" . }}'

inhibit_rules: []
