# Чистые URL + карточка /detail/{id}. Наследует root/index от внешнего server { }.
#
# ОБЯЗАТЕЛЬНО подключите эту строку В ОБОИХ блоках — и для listen 80, и для listen 443 ssl:
#   include /opt/prod-encar/deploy/nginx/snippets/wra-frontend-routes.conf;
# Иначе по HTTPS ссылки /about, /buy, /catalog не откроются (попадут в location / → главная).

# Старые URL → canonical без .html
location = /index.html {
    return 301 /;
}
location = /about.html {
    return 301 /about;
}
location = /howtobuy.html {
    return 301 /buy;
}
location = /contacts.html {
    return 301 /contacts;
}
location = /privacy.html {
    return 301 /privacy;
}
location = /cookies.html {
    return 301 /cookies;
}
location = /agreement.html {
    return 301 /agreement;
}

# Без слэша в конце
location = /about/ {
    return 301 /about;
}
location = /buy/ {
    return 301 /buy;
}
location = /contacts/ {
    return 301 /contacts;
}
location = /catalog/ {
    return 301 /catalog;
}
location = /privacy/ {
    return 301 /privacy;
}
location = /cookies/ {
    return 301 /cookies;
}
location = /agreement/ {
    return 301 /agreement;
}

# rewrite ... break — отдаём файл внутри этого location, без внутреннего захода в location = *.html (301).
location = /about {
    add_header Cache-Control "no-cache, must-revalidate" always;
    rewrite ^ /about.html break;
}
location = /buy {
    add_header Cache-Control "no-cache, must-revalidate" always;
    rewrite ^ /howtobuy.html break;
}
location = /contacts {
    add_header Cache-Control "no-cache, must-revalidate" always;
    rewrite ^ /contacts.html break;
}
location = /catalog {
    add_header Cache-Control "no-cache, must-revalidate" always;
    rewrite ^ /index.html break;
}
location = /privacy {
    add_header Cache-Control "no-cache, must-revalidate" always;
    rewrite ^ /privacy.html break;
}
location = /cookies {
    add_header Cache-Control "no-cache, must-revalidate" always;
    rewrite ^ /cookies.html break;
}
location = /agreement {
    add_header Cache-Control "no-cache, must-revalidate" always;
    rewrite ^ /agreement.html break;
}

location ~ ^/detail/[^/]+/?$ {
    add_header Cache-Control "no-cache, must-revalidate" always;
    try_files $uri /car.html =404;
}

location = /car.html {
    if ($arg_id != "") {
        return 301 /detail/$arg_id;
    }
    add_header Cache-Control "no-cache, must-revalidate" always;
    try_files $uri =404;
}
