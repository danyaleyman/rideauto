# Дубликат маршрутов из rideauto.conf (для ручной вставки в отдельный server { }).
# Основной деплой: правьте только deploy/nginx/rideauto.conf — там всё встроено, без include.

location = /index.html {
    return 301 /;
}
location = /about.html {
    return 301 /about;
}
location = /howtobuy.html {
    return 301 /buy;
}
location = /contacts.html {
    return 301 /contacts;
}
location = /privacy.html {
    return 301 /privacy;
}
location = /cookies.html {
    return 301 /cookies;
}
location = /agreement.html {
    return 301 /agreement;
}

location = /about/ {
    return 301 /about;
}
location = /buy/ {
    return 301 /buy;
}
location = /contacts/ {
    return 301 /contacts;
}
location = /catalog/ {
    return 301 /catalog;
}
location = /privacy/ {
    return 301 /privacy;
}
location = /cookies/ {
    return 301 /cookies;
}
location = /agreement/ {
    return 301 /agreement;
}

location ^~ /seo/korea/ {
    try_files $uri $uri/index.html =404;
    add_header Cache-Control "public, max-age=3600, must-revalidate" always;
}

# Карточка на Next: /car/{id}.
location ~ ^/detail/([^/]+)/?$ {
    return 301 /car/$1;
}

location = /car.html {
    if ($arg_id != "") {
        return 301 /car/$arg_id;
    }
    add_header Cache-Control "no-cache, must-revalidate" always;
    try_files $uri =404;
}
