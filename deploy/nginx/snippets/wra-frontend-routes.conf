# Чистые URL + карточка /detail/{id}. Наследует root/index от внешнего server { }.
#
# Подключайте в server { } (80 и 443):
#   include /opt/prod-encar/deploy/nginx/snippets/wra-frontend-routes.conf;
#
# Важно: односегментные пути (/buy, /about, …) обрабатывает @wra_extensionless
# в основном файле (location / … try_files … @wra_extensionless). Без этого
# try_files … /index.html отдаёт каталог на любой URL.

# Старые URL → canonical без .html
location = /index.html {
    return 301 /;
}
location = /about.html {
    return 301 /about;
}
location = /howtobuy.html {
    return 301 /buy;
}
location = /contacts.html {
    return 301 /contacts;
}
location = /privacy.html {
    return 301 /privacy;
}
location = /cookies.html {
    return 301 /cookies;
}
location = /agreement.html {
    return 301 /agreement;
}

# Без слэша в конце
location = /about/ {
    return 301 /about;
}
location = /buy/ {
    return 301 /buy;
}
location = /contacts/ {
    return 301 /contacts;
}
location = /catalog/ {
    return 301 /catalog;
}
location = /privacy/ {
    return 301 /privacy;
}
location = /cookies/ {
    return 301 /cookies;
}
location = /agreement/ {
    return 301 /agreement;
}

location ~ ^/detail/[^/]+/?$ {
    add_header Cache-Control "no-cache, must-revalidate" always;
    try_files $uri /car.html =404;
}

location = /car.html {
    if ($arg_id != "") {
        return 301 /detail/$arg_id;
    }
    add_header Cache-Control "no-cache, must-revalidate" always;
    try_files $uri =404;
}
