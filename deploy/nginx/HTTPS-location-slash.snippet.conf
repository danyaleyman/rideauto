# Вставьте в server { listen 443 ssl … } (тот же root), если этот блок не наследует
# prod-encar.conf целиком — иначе /buy и /privacy снова отдадут каталог.

location @wra_extensionless {
    rewrite ^/buy$ /howtobuy.html break;
    rewrite ^/catalog$ /index.html break;
    rewrite ^/([^./]+)$ /$1.html break;
    return 404;
}

location / {
    add_header Cache-Control "no-cache, must-revalidate" always;
    try_files $uri $uri/ @wra_extensionless;
}
