# Вставка в server { listen 443 ssl … } вместе с блоками из snippets/wra-frontend-routes.conf
# (или скопируйте из prod-encar.conf одним куском с «location = /index.html» до конца «location /»).

location = / {
    add_header Cache-Control "no-cache, must-revalidate" always;
    try_files /index.html =404;
}

location @wra_extensionless {
    rewrite ^/buy$ /howtobuy.html break;
    rewrite ^/catalog$ /index.html break;
    rewrite ^/([^./]+)$ /$1.html break;
    return 404;
}

location / {
    add_header Cache-Control "no-cache, must-revalidate" always;
    try_files $uri $uri/ @wra_extensionless;
}
