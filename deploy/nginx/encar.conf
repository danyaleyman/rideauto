server {
    listen 80;
    server_name rideauto.ru www.rideauto.ru;

    root /opt/prod-encar/frontend;
    index index.html;

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Serve precompressed JSON if present
    location ~* \.(json)$ {
        gzip_static on;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Chunked export files
    location /data/chunks/ {
        gzip_static on;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location = /index.html {
        return 301 /;
    }
    location = /about.html {
        return 301 /about;
    }
    location = /howtobuy.html {
        return 301 /buy;
    }
    location = /contacts.html {
        return 301 /contacts;
    }
    location = /privacy.html {
        return 301 /privacy;
    }
    location = /cookies.html {
        return 301 /cookies;
    }
    location = /agreement.html {
        return 301 /agreement;
    }
    location = /about/ {
        return 301 /about;
    }
    location = /buy/ {
        return 301 /buy;
    }
    location = /contacts/ {
        return 301 /contacts;
    }
    location = /catalog/ {
        return 301 /catalog;
    }
    location = /privacy/ {
        return 301 /privacy;
    }
    location = /cookies/ {
        return 301 /cookies;
    }
    location = /agreement/ {
        return 301 /agreement;
    }
    location ~ ^/detail/[^/]+/?$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri /car.html =404;
    }
    location = /car.html {
        if ($arg_id != "") {
            return 301 /detail/$arg_id;
        }
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # JS/CSS без immutable — обновления после деплоя видны без «застревания» на месяцы
    location ~* \.(css|js)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        try_files $uri =404;
    }

    location ~* \.(svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location ^~ /seo/korea/ {
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "public, max-age=3600, must-revalidate" always;
    }

    location = / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files /index.html =404;
    }

    location @wra_extensionless {
        rewrite ^/buy$ /howtobuy.html break;
        rewrite ^/catalog$ /index.html break;
        rewrite ^/([^./]+)$ /$1.html break;
        return 404;
    }

    location / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri $uri/ @wra_extensionless;
    }
}
