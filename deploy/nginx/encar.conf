server {
    listen 80;
    server_name rideauto.ru www.rideauto.ru;

    root /opt/prod-encar/frontend;
    index index.html;

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Serve precompressed JSON if present
    location ~* \.(json)$ {
        gzip_static on;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Chunked export files
    location /data/chunks/ {
        gzip_static on;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Static assets
    location ~* \.(css|js|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # SPA-like fallback for static pages
    location / {
        try_files $uri $uri/ /index.html;
    }
}
