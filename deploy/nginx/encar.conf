server {
    listen 80;
    server_name rideauto.ru www.rideauto.ru;

    root /opt/prod-encar/frontend;
    index index.html;

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Serve precompressed JSON if present
    location ~* \.(json)$ {
        gzip_static on;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Chunked export files
    location /data/chunks/ {
        gzip_static on;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Чистые URL + /detail — см. комментарий в snippets/wra-frontend-routes.conf (для 443 тоже include).
    include /opt/prod-encar/deploy/nginx/snippets/wra-frontend-routes.conf;

    # JS/CSS без immutable — обновления после деплоя видны без «застревания» на месяцы
    location ~* \.(css|js)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        try_files $uri =404;
    }

    location ~* \.(svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location @wra_extensionless {
        rewrite ^/buy$ /howtobuy.html break;
        rewrite ^/catalog$ /index.html break;
        rewrite ^/([^./]+)$ /$1.html break;
        return 404;
    }

    location / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri $uri/ @wra_extensionless;
    }
}
