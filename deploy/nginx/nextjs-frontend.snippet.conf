# Сниппет: главная и приложение Next.js на порту 3000 (или unix-socket).
# Вставьте в server { } для rideauto.ru ВЫШЕ общего «location /» и «location = /»,
# после блоков /api/. Скопируйте те же location в блок listen 443 ssl.
#
# Перед включением:
# 1) Удалите или закомментируйте старый «location = / { try_files /index.html }».
# 2) В «location @wra_extensionless» уберите «rewrite ^/catalog$ /index.html» — каталог на Next (/catalog).
# 3) Для /detail/ лучше «return 301 /car/$1» или прокси на Next (там уже редирект на /car/).
#
# upstream можно задать в http { }: «upstream wra_next { server 127.0.0.1:3000; keepalive 32; }»
# и заменить ниже proxy_pass на http://wra_next

location ^~ /_next/static/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    add_header Cache-Control "public, max-age=31536000, immutable";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /_next/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}

location = / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "no-cache, must-revalidate" always;
}

location ^~ /catalog {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "no-cache, must-revalidate" always;
}

location ^~ /car/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "no-cache, must-revalidate" always;
}

# Опционально: если SEO-посадки отдаёт сам Next (public/seo после sync), включите вместо
# «location ^~ /seo/korea/» на статическом root:
# location ^~ /seo/ {
#     proxy_pass http://127.0.0.1:3000;
#     proxy_set_header Host $host;
#     ...
# }

location ~ ^/(about|buy|contacts|privacy|cookies|agreement)(/|$) {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "no-cache, must-revalidate" always;
}
