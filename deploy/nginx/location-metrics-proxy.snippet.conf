# Опционально: отдать /metrics через nginx только доверенным IP.
# Вставьте внутрь server { } (например только в listen 443) ВЫШЕ общего location /.
# Замените 10.0.0.0/8 на вашу админскую подсеть или уберите allow/deny и используйте VPN.
#
# Предпочтительнее: не проксировать /metrics наружу, а скрапить 127.0.0.1:8080 локально (см. docs/MONITORING.md).

# allow 10.0.0.0/8;
# deny all;

location = /metrics {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
}
