# --- Включить ОДИН РАЗ в http { } основного nginx.conf (например /etc/nginx/nginx.conf) ---
#
# proxy_cache_path /var/cache/nginx/rideauto levels=1:2 keys_zone=rideauto_api:20m max_size=2g inactive=30m use_temp_path=off;
#
# Первый запуск (права под пользователя nginx — обычно www-data):
#   sudo mkdir -p /var/cache/nginx/rideauto
#   sudo chown -R www-data:www-data /var/cache/nginx/rideauto
#
# Сайт: используйте deploy/nginx/rideauto.conf — там отдельные location для кэша и обхода.
# Nginx выбирает самый длинный подходящий префикс location — персональные /api/me, /api/favorites
# идут без proxy_cache, публичные /api/cars, /api/facets — с micro-cache.
