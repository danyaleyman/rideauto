# rideauto.ru — статика + API (micro-cache только для публичного каталога).
#
# 1) В http { } главного nginx.conf добавьте (один раз):
#    proxy_cache_path /var/cache/nginx/prod-encar levels=1:2 keys_zone=prod_encar_api:20m max_size=2g inactive=30m use_temp_path=off;
#
#    sudo mkdir -p /var/cache/nginx/prod-encar
#    sudo chown -R www-data:www-data /var/cache/nginx/prod-encar
#
# 2) sudo nginx -t && sudo systemctl reload nginx
#
# Префиксные location: nginx сам берёт САМЫЙ ДЛИННЫЙ совпадающий префикс.
# Персональные маршруты — proxy_cache off; каталог — proxy_cache prod_encar_api.

server {
    listen 80;
    server_name rideauto.ru www.rideauto.ru;

    root /opt/prod-encar/frontend;
    index index.html;

    # --- Персональные / мутации — без кэша (должен побеждать длинный префикс над /api/). ---
    location /api/subscriptions/run-notifications {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_pass http://127.0.0.1:8080;
    }

    location /api/auth/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_pass http://127.0.0.1:8080;
    }

    location /api/me {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_pass http://127.0.0.1:8080;
    }

    location /api/logout {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_pass http://127.0.0.1:8080;
    }

    location /api/favorites {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_pass http://127.0.0.1:8080;
    }

    location /api/history {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_pass http://127.0.0.1:8080;
    }

    location /api/subscriptions {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_pass http://127.0.0.1:8080;
    }

    location /api/checkout {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_pass http://127.0.0.1:8080;
    }

    location /api/compare {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_pass http://127.0.0.1:8080;
    }

    location /api/health {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_read_timeout 30s;
        proxy_pass http://127.0.0.1:8080;
    }

    # --- Публичный каталог: micro-cache (нужен keys_zone prod_encar_api в http {}). ---
    location /api/cars {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache prod_encar_api;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 60s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_methods GET HEAD;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_read_timeout 300s;
        proxy_pass http://127.0.0.1:8080;
    }

    location /api/facets {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache prod_encar_api;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 60s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_methods GET HEAD;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_read_timeout 300s;
        proxy_pass http://127.0.0.1:8080;
    }

    # Alias как у конкурента (отдельный «тяжёлый» URL для фасетов).
    location /api/filters {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache prod_encar_api;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 60s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_methods GET HEAD;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_read_timeout 300s;
        proxy_pass http://127.0.0.1:8080;
    }

    location /api/stats {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache prod_encar_api;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 60s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_methods GET HEAD;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_read_timeout 120s;
        proxy_pass http://127.0.0.1:8080;
    }

    location /api/counts {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache prod_encar_api;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 60s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_methods GET HEAD;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_read_timeout 120s;
        proxy_pass http://127.0.0.1:8080;
    }

    location = /api/sort {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache prod_encar_api;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 1h;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_methods GET HEAD;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_read_timeout 60s;
        proxy_pass http://127.0.0.1:8080;
    }

    location /api/similar {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache prod_encar_api;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 20s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_methods GET HEAD;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_read_timeout 180s;
        proxy_pass http://127.0.0.1:8080;
    }

    location /api/car/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache prod_encar_api;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 20s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_methods GET HEAD;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_read_timeout 120s;
        proxy_pass http://127.0.0.1:8080;
    }

    # Остальные /api/* — без кэша (на случай новых эндпоинтов).
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_pass http://127.0.0.1:8080;
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/html application/json text/plain text/css application/javascript application/xml image/svg+xml application/wasm;

    # При сборке nginx с ngx_brotli раскомментируйте (сильнее сжимает JSON):
    # brotli on;
    # brotli_comp_level 5;
    # brotli_types text/html application/json text/plain text/css application/javascript application/xml image/svg+xml;

    # Главная и HTML — без долгого кэша (дизайн в index.html / правки разметки)
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # JS/CSS: без immutable — иначе после git pull месяцами отдаётся старый catalog.js с диска браузера
    location ~* \.(css|js)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        try_files $uri =404;
    }

    # Остальная статика — дольше (имена файлов редко те же при замене)
    location ~* \.(svg|png|jpg|jpeg|webp|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # Снимок фасетов при экспорте (первый экран без ожидания /api/facets).
    location = /data/catalog_facets.json {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400";
        try_files $uri =404;
    }

    location ~* ^/data/chunks/.*\.json(\.gz)?$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # Главная отдаётся как "/" через try_files — без этого заголовка браузер/CDN кэширует HTML
    location / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}
