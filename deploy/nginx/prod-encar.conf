# rideauto.ru — статика + API (micro-cache только для публичного каталога).
#
# 0) В http { } добавьте upstream с keepalive: deploy/nginx/http-upstream-wra-api.snippet
#    (иначе замените ниже все proxy_pass http://wra_api_backend на http://127.0.0.1:8080).
#
# 1) В http { } главного /etc/nginx/nginx.conf добавьте (один раз) ТОЛЬКО proxy_cache_path,
#    не путать с proxy_cache (последнее — только внутри location).
#    Готовая строка: deploy/nginx/http-proxy-cache-prod-encar.conf.snippet
#
#    proxy_cache_path /var/cache/nginx/prod-encar levels=1:2 keys_zone=prod_encar_api:20m max_size=2g inactive=30m use_temp_path=off;
#
#    sudo mkdir -p /var/cache/nginx/prod-encar
#    sudo chown -R www-data:www-data /var/cache/nginx/prod-encar
#
# 2) sudo nginx -t && sudo systemctl reload nginx
#
# Префиксные location: nginx сам берёт САМЫЙ ДЛИННЫЙ совпадающий префикс.
# Персональные маршруты — proxy_cache off; каталог — proxy_cache prod_encar_api.
#
# ⚠ HTTPS: в этом файле только listen 80. SSL обычно добавляет certbot (отдельный server 443).
#    Не затирайте sites-available целиком копией этого файла — пропадёт 443.
#    Диагностика: deploy/nginx/TROUBLESHOOT-HTTPS.txt
#    Скопируйте в server 443 блоки от «location = /index.html» до конца «location /».
#    Для HTTPS включите HTTP/2 (listen 443 ssl http2;): иначе браузер держит лимит 6 соединений
#    на домен — долгий /api/cars блокирует favicon и прочую статику на десятки секунд.
#
# ⚠ «conflicting server name rideauto.ru … ignored» — в sites-enabled ДВА server{} на :80
#    с одним server_name. Активен только ПЕРВЫЙ; второй (часто ваш prod-encar) игнорируется.
#    См. deploy/nginx/FIX-DUPLICATE-SERVER.txt — отключите лишний symlink.

server {
    listen 80;
    server_name rideauto.ru www.rideauto.ru;

    root /opt/prod-encar/frontend;
    index index.html;

    open_file_cache max=20000 inactive=30s;
    open_file_cache_valid 45s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # --- Персональные / мутации — без кэша (должен побеждать длинный префикс над /api/). ---
    location /api/subscriptions/run-notifications {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_pass http://wra_api_backend;
    }

    location /api/auth/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_pass http://wra_api_backend;
    }

    location /api/me {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_pass http://wra_api_backend;
    }

    location /api/logout {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_pass http://wra_api_backend;
    }

    location /api/favorites {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_pass http://wra_api_backend;
    }

    location /api/history {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_pass http://wra_api_backend;
    }

    location /api/subscriptions {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_pass http://wra_api_backend;
    }

    location /api/checkout {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_pass http://wra_api_backend;
    }

    location /api/compare {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_pass http://wra_api_backend;
    }

    location /api/health {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_read_timeout 30s;
        proxy_pass http://wra_api_backend;
    }

    # --- Публичный каталог: micro-cache (нужен keys_zone prod_encar_api в http {}). ---
    location /api/cars {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache prod_encar_api;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 60s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 20s;
        proxy_cache_methods GET HEAD;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_read_timeout 300s;
        proxy_pass http://wra_api_backend;
    }

    location /api/facets {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache prod_encar_api;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 60s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 20s;
        proxy_cache_methods GET HEAD;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_read_timeout 300s;
        proxy_pass http://wra_api_backend;
    }

    # Alias как у конкурента (отдельный «тяжёлый» URL для фасетов).
    location /api/filters {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache prod_encar_api;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 60s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 20s;
        proxy_cache_methods GET HEAD;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_read_timeout 300s;
        proxy_pass http://wra_api_backend;
    }

    location /api/stats {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache prod_encar_api;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 90s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 20s;
        proxy_cache_methods GET HEAD;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_read_timeout 120s;
        proxy_pass http://wra_api_backend;
    }

    location /api/counts {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache prod_encar_api;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 90s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 20s;
        proxy_cache_methods GET HEAD;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_read_timeout 120s;
        proxy_pass http://wra_api_backend;
    }

    location = /api/sort {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache prod_encar_api;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 1h;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 20s;
        proxy_cache_methods GET HEAD;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_read_timeout 60s;
        proxy_pass http://wra_api_backend;
    }

    location /api/similar {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache prod_encar_api;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 20s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 20s;
        proxy_cache_methods GET HEAD;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_read_timeout 180s;
        proxy_pass http://wra_api_backend;
    }

    location /api/car/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache prod_encar_api;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 20s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 20s;
        proxy_cache_methods GET HEAD;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_read_timeout 120s;
        proxy_pass http://wra_api_backend;
    }

    # Остальные /api/* — без кэша (на случай новых эндпоинтов).
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_pass http://wra_api_backend;
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    # text/html не указываем — gzip и так сжимает HTML; дубликат даёт предупреждение nginx.
    gzip_types application/json text/plain text/css application/javascript application/xml image/svg+xml application/wasm;

    # Brotli: только если в выводе `nginx -V` есть ngx_http_brotli_module (иначе `nginx -t` упадёт и deploy_prod.sh остановится).
    # После включения задайте brotli_types тем же набором, что gzip_types, чтобы JSON API и XML sitemap сжимались сильнее gzip.
    # Раскомментируйте после установки модуля:
    # brotli on;
    # brotli_comp_level 5;
    # brotli_static on;
    # brotli_types application/json text/plain text/css application/javascript application/xml image/svg+xml application/wasm;

    # Sitemap (индекс + шарды) — как статичный каталог: micro-cache.
    location /api/sitemap/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache prod_encar_api;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 1h;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 20s;
        proxy_cache_methods GET HEAD;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_read_timeout 120s;
        proxy_pass http://wra_api_backend;
    }

    # Файловый sitemap (cron: scripts/generate_sitemap_files.py --out /var/www/sitemap … --web-path /sitemap-gen/).
    # Краулеры не грузят API; см. deploy/systemd/prod-encar-sitemap-gen.* и frontend/robots.txt.
    location /sitemap-gen/ {
        alias /var/www/sitemap/;
        default_type application/xml;
        add_header Cache-Control "public, max-age=3600";
        autoindex off;
    }

    # Ниже — без include: один файл можно копировать на сервер без папки snippets/.

    location = /index.html {
        return 301 /;
    }
    location = /about.html {
        return 301 /about;
    }
    location = /howtobuy.html {
        return 301 /buy;
    }
    location = /contacts.html {
        return 301 /contacts;
    }
    location = /privacy.html {
        return 301 /privacy;
    }
    location = /cookies.html {
        return 301 /cookies;
    }
    location = /agreement.html {
        return 301 /agreement;
    }

    location = /about/ {
        return 301 /about;
    }
    location = /buy/ {
        return 301 /buy;
    }
    location = /contacts/ {
        return 301 /contacts;
    }
    location = /catalog/ {
        return 301 /catalog;
    }
    location = /privacy/ {
        return 301 /privacy;
    }
    location = /cookies/ {
        return 301 /cookies;
    }
    location = /agreement/ {
        return 301 /agreement;
    }

    # SEO: подмена на HTML с динамическими meta/JSON-LD (тот же layout, что car.html):
    # location ~ ^/detail/([^/]+)/?$ {
    #     proxy_pass http://wra_api_backend/api/html/car/$1;
    #     proxy_set_header Host $host;
    #     ...
    # }
    location ~ ^/detail/([^/]+)/?$ {
        return 301 /car/$1;
    }

    location = /car.html {
        if ($arg_id != "") {
            return 301 /car/$arg_id;
        }
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # JS/CSS: 1h + must-revalidate. Для более длинного cache добавляйте хэш в имени файла или ?v= и поднимите max-age.
    location ~* \.(css|js)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        try_files $uri =404;
    }

    # Остальная статика — дольше (имена файлов редко те же при замене)
    location ~* \.(svg|png|jpg|jpeg|webp|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # Снимок фасетов при экспорте (первый экран без ожидания /api/facets).
    location = /data/catalog_facets.json {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400";
        try_files $uri =404;
    }

    location = /data/encar_mapping.json {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400";
        try_files $uri =404;
    }

    location ~* ^/data/chunks/.*\.json(\.gz)?$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # Статические SEO-посадки марка/модель (Korea Encar). Генерация: node scripts/generate-seo-landings.mjs
    location ^~ /seo/korea/ {
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "public, max-age=3600, must-revalidate" always;
    }

    # Главная: при переходе на Next.js замените блок на proxy_pass — см. deploy/nginx/nextjs-frontend.snippet.conf
    # (иначе пользователи получат старый frontend/index.html вместо приложения на :3000).
    location = / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files /index.html =404;
    }

    # /buy, /privacy и т.д. → *.html; не подставлять каталог на любой путь.
    location @wra_extensionless {
        rewrite ^/buy$ /howtobuy.html break;
        rewrite ^/catalog$ /index.html break;
        rewrite ^/([^./]+)$ /$1.html break;
        return 404;
    }

    location / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri $uri/ @wra_extensionless;
    }
}
