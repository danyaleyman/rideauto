# Apex → www (отчёты и карточки: https://www.wrideauto.ru/car.html?id=…)
server {
    listen 80;
    listen [::]:80;
    server_name wrideauto.ru;
    return 301 http://www.wrideauto.ru$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.wrideauto.ru;

    root /opt/prod-encar/frontend;
    index index.html;

    # API (aiohttp api_server.py)
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Опционально: отчёты Telegram-бота (Flask /r/<token>), порт = REPORT_SERVER_PORT
    # location /r/ {
    #     proxy_pass http://127.0.0.1:9090/r/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    gzip on;
    gzip_types application/json text/plain text/css application/javascript application/xml image/svg+xml;
    gzip_min_length 1024;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|svg|png|jpg|jpeg|webp|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* ^/data/chunks/.*\.json(\.gz)?$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
}
