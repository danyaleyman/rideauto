services:
  api:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - encar_data:/data
    environment:
      WRA_GIT_SHA: ${WRA_GIT_SHA:-}
      # Корея: /data/encar_cars.db (--db в Dockerfile). Китай (Dongchedi): отдельный SQLite в том же томе.
      WRA_CHINA_DB_PATH: ${WRA_CHINA_DB_PATH:-/data/encar_china.db}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WRA_RATE_LIMIT_POST_PER_MINUTE: ${WRA_RATE_LIMIT_POST_PER_MINUTE:-0}
      WRA_RATE_LIMIT_TELEGRAM_AUTH_PER_MINUTE: ${WRA_RATE_LIMIT_TELEGRAM_AUTH_PER_MINUTE:-0}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-}

volumes:
  encar_data:
