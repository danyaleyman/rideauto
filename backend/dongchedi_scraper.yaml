# 懂车帝 → SQLite: python -m dongchedi.scraper --config dongchedi_scraper.yaml
#
# Локально: cd backend && python -m dongchedi.scraper --config dongchedi_scraper.yaml
#   → файл backend/encar_china.db (или переопределите --db).
# Прод (рядом с encar_cars.db): добавьте --db /opt/prod-encar/encar_china.db или задайте тот же путь в db_path ниже.

db_path: encar_china.db
# Один прогон без brand на API даёт ~10k объявлений (has_more обрывается). Чтобы добрать каталог:
# shard_brands: true   # много проходов sh_sku_list по списку марок (см. dongchedi/brand_shards.py)
# brand_ids: ["4", "16", "10"]  # явный список марок (перекрывает shard_brands и brand_id)
# brand_id: "4"       # одна марка (если shard_brands: false)
# sh_city_name: 北京  # опционально; ещё один срез выдачи по городу
# age_range: "3,5"   # как в HAR (возраст авто)
# series_id: 2825    # фильтр после ответа API (числовой id серии)
# limit: 0           # 0 = без лимита; иначе макс. объявлений за прогон (кап 100)
# max_pages: 200
# page_size: 60     # 1–100 за запрос
# enrich_detail: true   # false — быстрее, но без my_price (листинг маскирует цены)
# detail_concurrency: 6
# cny_to_rub: 13
#
# Перезапуск после обрыва (рядом с db_path появится encar_china.scraper.checkpoint.json):
#   python -m dongchedi.scraper --config dongchedi_scraper.yaml --resume
# Или явно: --resume --db encar_china.db
# Отключить запись checkpoint: no_checkpoint: true  или флаг --no-checkpoint
# resume: true   # то же, что CLI --resume (если добавите в yaml)
