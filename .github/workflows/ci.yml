name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m json.tool ../data/fuel_label_aliases.json > /dev/null
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: python -m pytest tests -q

  frontend-eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint:js

  frontend-tailwind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build:car-tailwind

  next-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m json.tool data/fuel_label_aliases.json >/dev/null
        working-directory: ${{ github.workspace }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: node scripts/sync-static-data.mjs
      - run: python backend/scripts/ci_verify_fuel_alias_sync.py
        working-directory: ${{ github.workspace }}
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    env:
      CI: true
      PYTHON: python3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: pip install -r backend/requirements.txt
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e

