openapi: 3.0.3
info:
  title: RideAuto API (публичные эндпоинты)
  version: "1.0"
  description: |
    Минимальное описание read-only API каталога и служебных маршрутов.
    Полный набор query-параметров для `/api/cars` и ответы см. в `backend/fastapi_app/routers/search.py` и схемах Pydantic.
    Лимиты GET по IP: `WRA_RATE_LIMIT_GET_CARS_PER_MINUTE`, `WRA_RATE_LIMIT_GET_FACETS_PER_MINUTE` (0 = без лимита).
    Курсорная пагинация: query `cursor` в `/api/cars` для сортировок date_*, year_*, mileage_*, price_high / price_low; см. `meta.next_cursor`.
    Без `cursor`: глубокий `page` ограничен для анонимов (`WRA_CATALOG_MAX_PAGE_OFFSET_ANON`, по умолчанию 80; `-1` = выкл.); при сессии Bearer — `WRA_CATALOG_MAX_PAGE_OFFSET_AUTH` (0 = без лимита).
    Кэш фасетов в воркере: `WRA_FACETS_CACHE_TTL` (сек, по умолчанию 300).
    Метрики: `GET /api/metrics` при `WRA_PROMETHEUS_METRICS=1` (в т.ч. `wra_http_request_duration_ms_p95`).

servers:
  - url: /

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: unauthorized
    RateLimitError:
      type: object
      properties:
        error:
          type: string
          example: rate_limit

paths:
  /api/health:
    get:
      summary: Проверка живости
      parameters:
        - name: deep
          in: query
          description: "1 — углублённая проверка каталога (доступность БД и COUNT cars)"
          schema: { type: string, enum: ["1"] }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  git_sha:
                    type: string
                    nullable: true
                    description: Если задан WRA_GIT_SHA или GIT_COMMIT
                  catalog_db:
                    type: object
                    nullable: true
                    description: При deep=1 — результат проверки основной БД каталога

  /api/metrics:
    get:
      summary: Prometheus text exposition (выкл. по умолчанию)
      description: Доступно только при WRA_PROMETHEUS_METRICS=1
      responses:
        "200":
          content:
            text/plain:
              schema: { type: string }
        "404":
          description: Метрики отключены

  /api/version:
    get:
      summary: Версия сервиса (без кэша)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                    example: rideauto-api
                  git_sha:
                    type: string
                    nullable: true
                  python:
                    type: string
                    example: "3.12.0"

  /api/cars:
    get:
      summary: Список автомобилей (каталог)
      description: При включённом WRA_RATE_LIMIT_GET_CARS_PER_MINUTE возможен ответ 429.
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: per_page
          in: query
          schema: { type: integer }
        - name: full
          in: query
          description: "1 — полные записи"
          schema: { type: string }
        - name: source
          in: query
          description: "encar | dongchedi | china (china = весь китайский каталог, Dongchedi). Без параметра — все записи"
          schema: { type: string, enum: [dongchedi, encar, china] }
        - name: region
          in: query
          description: "korea | china — рынок каталога; при потере source сужает выборку (как encar или china)"
          schema: { type: string, enum: [korea, china] }
        - name: cursor
          in: query
          description: "Opaque keyset-курсор из meta.next_cursor (сортировки date/year/mileage/price_high/price_low)"
          schema: { type: string }
      responses:
        "200":
          description: JSON каталога
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Слишком большой номер страницы без cursor (см. error deep_pagination_requires_cursor)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string, example: deep_pagination_requires_cursor }
                  detail: { type: string }
                  max_page: { type: integer }
        "429":
          description: Слишком много запросов (лимит GET)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitError"

  /api/sitemap/catalog.xml:
    get:
      summary: Sitemap карточек каталога (URL вида /detail/{id})
      description: |
        Генерация XML urlset; объём задаётся `WRA_SITEMAP_MAX_URLS` (по умолчанию 12000, максимум 45000).
        Базовый домен — `PUBLIC_SITE_URL` или https://rideauto.ru .
        Параметр `part` (1..N) — срез по `WRA_SITEMAP_MAX_URLS` URL (шард).
      parameters:
        - name: part
          in: query
          schema: { type: integer, default: 1 }
      responses:
        "200":
          description: application/xml
          content:
            application/xml:
              schema:
                type: string
        "304":
          description: Not Modified (If-None-Match / ETag)

  /api/sitemap/index.xml:
    get:
      summary: Индекс sitemap (статические страницы + шарды каталога)
      responses:
        "200":
          content:
            application/xml:
              schema: { type: string }

  /api/html/car/{id}:
    get:
      summary: Полный car.html с подстановкой SEO (title, OG, JSON-LD Product)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            text/html:
              schema: { type: string }
        "404":
          description: Объявление не найдено (noindex)

  /api/facets:
    get:
      summary: Фасеты / фильтры (алиас может быть /api/filters)
      parameters:
        - name: source
          in: query
          description: "Как у /api/cars: dongchedi | encar | china"
          schema: { type: string, enum: [dongchedi, encar, china] }
        - name: region
          in: query
          description: "Как у /api/cars: korea | china"
          schema: { type: string, enum: [korea, china] }
      responses:
        "200":
          content:
            application/json:
              schema: { type: object }
        "429":
          description: Лимит GET
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitError"

  /api/stats:
    get:
      summary: Агрегированная статистика каталога (в т.ч. korea_listed / china_listed)
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  listed_today: { type: integer }
                  date_utc: { type: string }
                  total: { type: integer }
                  korea_listed: { type: integer }
                  china_listed: { type: integer }

  /api/counts:
    get:
      summary: Счётчики для UI (в т.ч. korea_listed / china_listed для карточек рынка)
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  listed_today: { type: integer }
                  date_utc: { type: string }
                  total: { type: integer }
                  korea_listed: { type: integer }
                  china_listed: { type: integer }

  /api/sort:
    get:
      summary: Метаданные сортировки
      responses:
        "200":
          content:
            application/json:
              schema: { type: object }

  /api/car/{id}:
    get:
      summary: Одна карточка по id
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { type: object }
        "404":
          description: Не найдено

  /api/compare:
    get:
      summary: Краткие поля для сравнения (до 4 id через запятую)
      parameters:
        - name: ids
          in: query
          description: "Например: c1,c2,c3"
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: array
                    items: { type: object }

  /api/similar:
    get:
      summary: Похожие объявления
      parameters:
        - name: car_id
          in: query
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 8 }
      responses:
        "200":
          content:
            application/json:
              schema: { type: object }

  /api/auth/telegram:
    post:
      summary: Вход через Telegram Login Widget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Токен и пользователь
          content:
            application/json:
              schema: { type: object }
        "400":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "503":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/logout:
    post:
      summary: Выход (инвалидировать сессию на сервере)
      security:
        - bearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }

  /api/me:
    get:
      summary: Текущий пользователь
      security:
        - bearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema: { type: object }
        "401":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/favorites:
    get:
      summary: Избранное
      security:
        - bearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema: { type: object }
        "401":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    post:
      summary: Добавить в избранное
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                car_id: { type: string }
                note: { type: string, nullable: true }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "400":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/favorites/{car_id}:
    delete:
      summary: Удалить из избранного
      security:
        - bearerAuth: []
      parameters:
        - name: car_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "401":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/history:
    get:
      summary: История просмотров
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          content:
            application/json:
              schema: { type: object }
        "401":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    post:
      summary: Записать просмотр
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                car_id: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "400":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/subscriptions:
    get:
      summary: Подписки
      security:
        - bearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema: { type: object }
        "401":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    post:
      summary: Создать подписку
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                filters: { type: object }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "401":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/subscriptions/{sid}:
    delete:
      summary: Удалить подписку
      security:
        - bearerAuth: []
      parameters:
        - name: sid
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "401":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/checkout:
    get:
      summary: Список заявок checkout
      security:
        - bearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema: { type: object }
        "401":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    post:
      summary: Создать заявку
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                car_ids:
                  type: array
                  items: { type: string }
                comment: { type: string, nullable: true }
                contact: { type: string, nullable: true }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "400":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/subscriptions/run-notifications:
    post:
      summary: Рассылка по подпискам (X-Admin-Key)
      parameters:
        - name: X-Admin-Key
          in: header
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { type: object }
        "403":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "503":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
